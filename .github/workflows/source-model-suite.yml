name: Source Model Suite

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-model-suite:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync model suite
        run: |
          chmod +x ./scripts/source-model-suite.sh
          ./scripts/source-model-suite.sh

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: chore/sync-model-suite
          title: "chore: sync sourced model suite"
          commit-message: "chore: sync sourced model suite"
          body: |
            Automated sync of model suite from `Cleanskiier27/Preciseliens`.

            Updated path:
            - `vendor/transformers-model-suite/models`
          labels: |
            dependencies
            automation
